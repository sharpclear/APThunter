
services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: atdv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: apthunter_new
      MYSQL_USER: apthunter
      MYSQL_PASSWORD: 4CyUhr2zu6!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - atdv-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: atdv-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: 123456789
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # 控制台端口
    volumes:
      - minio_data:/data
    networks:
      - atdv-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端 FastAPI 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atdv-backend
    restart: unless-stopped
    environment:
      # MinIO 配置
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: 123456789
      MINIO_BUCKET: uploads
      # MySQL 配置
      MYSQL_URL: mysql+pymysql://apthunter:4CyUhr2zu6!@mysql:3306/apthunter_new
      # 模型配置
      IMPERSONATION_MODEL_NAME: impersonation_detector
    ports:
      - "8000:8000"
    volumes:
      # 如果需要挂载模型文件或其他数据，可以在这里添加
      # - ./backend/models:/app/models
      - backend_data:/app/data
    networks:
      - atdv-network
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # 前端 Vue 应用服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atdv-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 挂载自定义 nginx 主配置文件
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 挂载自定义 nginx 站点配置（如果需要动态修改）
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - atdv-network
    depends_on:
      - backend
    environment:
      # 可以通过环境变量传递 API 地址（如果需要）
      - API_BASE_URL=http://backend:8000

# 数据卷定义
volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
  backend_data:
    driver: local

# 网络定义
networks:
  atdv-network:
    driver: bridge

